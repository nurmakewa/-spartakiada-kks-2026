        *,
        *::before,

        :root {
            --bg-primary: #0B0E1A;

            --border-color: #2A3348;

        }
        html {
            scroll-behavior: smooth;
        }
        body {

            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }

            width: 6px;
        }

            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 8px;
        }
